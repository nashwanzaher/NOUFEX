name: EAS Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options: [all, ios, android]
        default: all
      profile:
        description: 'EAS Build profile'
        required: true
        type: choice
        options: [development, preview, production]
        default: preview

concurrency:
  group: eas-${{ github.ref }}-${{ github.event.inputs.profile || 'preview' }}
  cancel-in-progress: false

env:
  TURBO_TELEMETRY_DISABLED: 1
  EXPO_NO_DOTENV: 1

jobs:
  build-packages:
    name: Build shared packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-dist-${{ github.run_id }}
          path: |
            packages/types/dist/
            packages/ui-tokens/dist/
            packages/core-api/dist/
          retention-days: 1

  build-mobile:
    name: EAS Build (mobile-app)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Approve native scripts
        run: npm approve-scripts --allow-scripts-pending

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages-dist-${{ github.run_id }}
          path: ./packages

      - name: EAS Build
        working-directory: apps/mobile-app
        env:
          PLATFORM: ${{ github.event.inputs.platform || 'all' }}
          PROFILE: ${{ github.event.inputs.profile || 'preview' }}
        run: |
          echo "Building for platform: $PLATFORM with profile: $PROFILE"
          eas build \
            --non-interactive \
            --platform "$PLATFORM" \
            --profile "$PROFILE" \
            --message "GitHub Actions build from ${{ github.sha }}"
