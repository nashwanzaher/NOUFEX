name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  EXPO_NO_DOTENV: 1
  EXPO_NO_CLIENT_ENV_VARS: 1

jobs:
  validate:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: rm -rf node_modules && npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          EXPO_PUBLIC_API_URL: https://api.noufex.com/v1

      - name: Security audit
        run: npm audit --audit-level=moderate

  web-build:
    name: Web PWA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Upload .next
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa-build-${{ github.run_id }}
          path: ./apps/web-pwa/.next
          retention-days: 7
          compression-level: 9

      - name: Upload build report
        if: always()
        run: |
          echo "Build completed at $(date)" >> build-info.txt
          echo "Node version: $(node --version)" >> build-info.txt
          echo "npm version: $(npm --version)" >> build-info.txt
          echo "Build status: ${{ job.status }}" >> build-info.txt

      - name: Upload build info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-info-${{ github.run_id }}
          path: build-info.txt
          retention-days: 7
