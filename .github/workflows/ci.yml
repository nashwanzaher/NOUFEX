name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  EXPO_NO_DOTENV: 1
  EXPO_NO_CLIENT_ENV_VARS: 1

jobs:
  validate:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          EXPO_PUBLIC_API_URL: https://api.noufex.com/v1

  web-build:
    name: Web PWA bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Upload .next
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa-build
          path: apps/web-pwa/.next
          retention-days: 7
