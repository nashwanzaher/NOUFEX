name: noufex

services:
  ai_backend:
    build: ../NOUFEX_AI/backend
    ports: ["8001:8000"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://postgres:postgres@ai_db:5432/noufex_ai
    depends_on: [ai_db]
    networks: [noufex_net]

  ai_frontend:
    build: ../NOUFEX_AI/frontend
    ports: ["3001:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on: [ai_backend]
    networks: [noufex_net]

  ai_db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noufex_ai
    volumes: ["ai_db:/var/lib/postgresql/data"]
    networks: [noufex_net]

  ecm_backend:
    build: ../NOUFEX_ECM/backend
    ports: ["8002:8000"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DB_HOST: ecm_db
    depends_on: [ecm_db, ecm_redis]
    networks: [noufex_net]

  ecm_frontend:
    build: ../NOUFEX_ECM/frontend
    ports: ["3002:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8002
    depends_on: [ecm_backend]
    networks: [noufex_net]

  ecm_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noufex_ecm
    volumes: ["ecm_db:/var/lib/postgresql/data"]
    networks: [noufex_net]

  ecm_redis:
    image: redis:7-alpine
    networks: [noufex_net]

  erp_backend:
    build: ../NOUFEX_ERP/backend
    ports: ["8003:8000"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@erp_db:5432/noufex_erp
    depends_on: [erp_db, erp_redis]
    networks: [noufex_net]

  erp_frontend:
    build: ../NOUFEX_ERP/frontend
    ports: ["3003:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8003
    depends_on: [erp_backend]
    networks: [noufex_net]

  erp_worker:
    build: ../NOUFEX_ERP/backend
    command: celery -A worker.celery_app worker -l info
    depends_on: [erp_redis, erp_db]
    networks: [noufex_net]

  erp_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: noufex_erp
    volumes: ["erp_db:/var/lib/postgresql/data"]
    networks: [noufex_net]

  erp_redis:
    image: redis:7-alpine
    networks: [noufex_net]

  erp_superset:
    image: apache/superset:4.0.0
    ports: ["8088:8088"]
    depends_on: [erp_db]
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me}
    networks: [noufex_net]

  vpn_backend:
    build: ../NOUFEX_VPN/backend
    ports: ["8004:8000"]
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun"]
    volumes: ["./wireguard:/etc/wireguard"]
    networks: [noufex_net]

  vpn_frontend:
    build: ../NOUFEX_VPN/frontend
    ports: ["3004:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8004
    depends_on: [vpn_backend]
    networks: [noufex_net]

  mkt_backend:
    build: ../NOUFEX_MKT/backend
    ports: ["8005:8000"]
    environment:
      REDIS_URL: redis://mkt_redis:6379/0
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on: [mkt_redis]
    networks: [noufex_net]

  mkt_worker:
    build: ../NOUFEX_MKT/backend
    command: celery -A celery_app worker -l info
    depends_on: [mkt_redis]
    networks: [noufex_net]

  mkt_beat:
    build: ../NOUFEX_MKT/scheduler
    depends_on: [mkt_redis]
    networks: [noufex_net]

  mkt_frontend:
    build: ../NOUFEX_MKT/frontend
    ports: ["3005:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8005
    depends_on: [mkt_backend]
    networks: [noufex_net]

  mkt_redis:
    image: redis:7-alpine
    networks: [noufex_net]

  pgadmin:
    image: dpage/pgadmin4:8.12.0
    ports: ["5050:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@noufex.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    volumes: ["./pgadmin/servers.json:/pgadmin4/servers.json"]
    depends_on:
      - ai_db
      - ecm_db
      - erp_db
    networks: [noufex_net]

  nginx:
    image: nginx:1.27-alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on:
      - ai_frontend
      - ecm_frontend
      - erp_frontend
      - vpn_frontend
      - mkt_frontend
    networks: [noufex_net]

networks:
  noufex_net:
    driver: bridge

volumes:
  ai_db:
  ecm_db:
  erp_db:
